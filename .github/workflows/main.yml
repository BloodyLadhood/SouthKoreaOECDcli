name: Update CLI Data

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 이 줄이 버튼을 만듭니다.
  schedule:
    - cron: '0 0 1 * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: # 파일 쓰기 권한 명시적 부여
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pandas requests

      - name: Run Update Script
        run: python update_cli.py

      - name: Commit and Push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add korea_cli_history.csv
          git commit -m "Update CLI data for April 2026 analysis" || echo "No changes to commit"
          git push