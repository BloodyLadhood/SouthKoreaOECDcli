name: Update CLI Data

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # <--- 이 한 줄이 "Run workflow" 버튼을 만드는 마법의 주문입니다!
  schedule:
    - cron: '0 0 1 * *' # 매달 1일 자동 실행

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v3

      - name: 파이썬 설치
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 라이브러리 설치
        run: |
          pip install pandas requests

      - name: 스크립트 실행
        run: python update_cli.py

  - name: Run Update Script
      run: python update_cli.py

    - name: Check and Push CSV
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add korea_cli_history.csv
        git commit -m "Update CLI data for April 2026" || echo "No changes to commit"
        git push