name: Update OECD CLI Data

on:
  schedule:
    # 매월 10일 자정(UTC)에 실행 (OECD 갱신 주기 고려)
    - cron: '0 0 10 * *'
  workflow_dispatch: # 필요할 때 수동으로도 실행 가능 버튼 생성

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v3

      - name: 파이썬 설치
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 라이브러리 설치
        run: |
          pip install pandas requests

      - name: 스크립트 실행
        run: python update_cli.py

      - name: 변경사항 저장(Commit) 및 푸시(Push)
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add korea_cli_history.csv
          git commit -m "Auto-update Korea CLI data: $(date)" || echo "No changes to commit"
          git push