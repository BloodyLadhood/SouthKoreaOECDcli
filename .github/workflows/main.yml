name: Update CLI Data

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'

# 경고를 없애기 위해 Node.js 24 사용을 명시적으로 수락합니다.
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      # v4 대신 최신 업데이트가 반영된 버전을 사용하거나, 
      # Node 24 환경 변수가 적용된 상태에서 실행합니다.
      - name: Checkout code
        uses: actions/checkout@v4 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: Run Update Script
        run: python update_cli.py

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add korea_cli_history.csv
          git commit -m "System: Routine Update CLI data" || echo "No changes to commit"
          git push